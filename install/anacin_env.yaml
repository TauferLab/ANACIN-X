# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  # add package specs to the `specs` list
  specs:
  - eigen@3.3.7
  - libtool
  - libunwind
  - nlohmann-json@3.7.0
  - igraph@0.7.1
  - spdlog
  # ANACIN-X only requires Boost.MPI and Boost.Serialization in-tree.
  # Keep this spec intentionally broad so newer Spack releases can concretize it.
  - boost@1.69:+mpi+serialization
  - cmake@3.22.6
  view: true
  concretizer:
    unify: true
